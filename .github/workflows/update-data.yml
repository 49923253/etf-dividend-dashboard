name: Update ETF data.json

on:
  workflow_dispatch:
  schedule:
    # Daily 08:20 Asia/Taipei (UTC+8) => 00:20 UTC
    - cron: "20 0 * * *"

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update data.json
        run: |
          node tools/fetch_twse_etf_enrich.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "etf-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git commit -m "chore(data): daily refresh"
          git push
